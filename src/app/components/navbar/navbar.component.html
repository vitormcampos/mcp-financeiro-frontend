<nav class="navbar">
  <a routerLink="/" class="brand">
    <i class="bi bi-cash-stack brand-icon"></i>
    <span class="brand-text">CashFlow AI</span>
  </a>

  @if (userIsLoggedIn()) {
    <div class="nav-balance">
      <span class="balance-label">Saldo</span>
      <span
        class="balance-value"
        [class.positive]="totalCashFlow() >= 0"
        [class.negative]="totalCashFlow() < 0"
      >
        {{ totalCashFlow() | currency: "BRL" }}
      </span>
    </div>
  }

  <div class="nav-actions">
    @if (userIsLoggedIn()) {
      <a routerLink="dashboard" class="nav-link" routerLinkActive="active">
        <i class="bi bi-grid-1x2"></i>
        <span>Dashboard</span>
      </a>
      <button class="nav-link btn-logout" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        <span>Sair</span>
      </button>
    } @else {
      <a routerLink="login" class="nav-link">
        <i class="bi bi-box-arrow-in-right"></i>
        <span>Entrar</span>
      </a>
      <a routerLink="register" class="nav-link btn-register">
        <span>Criar Conta</span>
      </a>
    }
  </div>
</nav>
